<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management | Go System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- Centered Header Section -->
        <header class="manage-header">
            <div class="top-nav">
                <a href="/dashboard" class="back-link">← Dashboard</a>
                <span id="status-tag">● System Live</span>
            </div>
            <h1 class="centered-title">🛠️ User Management</h1>
        </header>

        <section class="card list-card">
            <div class="card-header">
                <h2>Active Directory</h2>
                <span id="user-count" class="badge">0 Users</span>
            </div>
            
            <div id="manage-list" class="user-list">
                <p class="empty-msg">Fetching database records...</p>
            </div>

            <div class="card-footer">
                <p>Powered by <strong>Chekus Joseph Coder</strong></p>
            </div>
        </section>
    </main>

    <script>
        // ... (Your existing JavaScript for loading and deleting users) ...
        window.onload = function() {
            fetch('/api/user')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('manage-list');
                    const count = document.getElementById('user-count');
                    count.innerText = `${data.length} Users`;
                    if (data.length === 0) {
                        list.innerHTML = '<p class="empty-msg">No records found.</p>';
                        return;
                    }
                    list.innerHTML = '';
                    data.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'user-item manage-item';
                        div.innerHTML = `
                            <div class="user-info">
                                <span class="user-name">${user.name}</span>
                                <span class="user-id">UID: ${user.id}</span>
                            </div>
                            <button onclick="deleteUser(${user.id})" class="btn-delete">Delete</button>
                        `;
                        list.appendChild(div);
                    });
                });
        };

        function deleteUser(id) {
            if(!confirm("Are you sure?")) return;
            fetch(`/api/user/${id}`, { method: 'DELETE' }).then(() => location.reload());
        }
    </script>
</body>
</html>
