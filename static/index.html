<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Pro Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <h1>🚀 Go System Dashboard</h1>
            <div class="status-bar">
                <span id="status-tag">● Server Online</span>
                <span id="start-time">Started: --:--:--</span>
                <span id="live-clock">00:00:00</span>
            </div>
        </header>

        <!-- Input Card -->
        <section class="card">
            <h2>User Registration</h2>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Enter name (e.g. Gopher)">
                <button class="btn-primary" onclick="testAPI()">Add User</button>
            </div>
            <div id="response-box" class="hidden">
                <pre id="api-data"></pre>
            </div>
        </section>

        <!-- NEW: User List Card -->
        <section class="card list-card">
            <h2>Registered Users</h2>
            <div id="user-list" class="user-list">
                <p class="empty-msg">No users added yet...</p>
            </div>
        </section>

        <footer>
               <p> Built By <strong> Chekus </strong> and ❤️ </p>
        </footer>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
