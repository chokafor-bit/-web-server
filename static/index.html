<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go System Pro | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0b0f1a;
  --card-dark: #111827;
  --neon-cyan: #00f5ff;
  --neon-violet: #8b5cf6;
  --text-main: #ffffff;
  --text-dim: #9ca3af;
  --neon-green: #22c55e;
  --neon-red: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text-main);
  min-height: 100vh;
}

nav {
  width: 100%; padding: 20px 40px;
  display: flex; justify-content: space-between; align-items: center;
}

.logo {
  font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(to right, var(--neon-cyan), var(--neon-violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

nav ul { display: flex; list-style: none; gap: 25px; }
nav ul li a { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
nav ul li a:hover { color: white; }

.container { max-width: 1100px; margin: auto; padding: 30px 20px 50px; }

header { margin-bottom: 25px; }
header h1 { font-size: 2rem; margin-bottom: 10px; }

.status-bar { display: flex; gap: 15px; font-size: 0.8rem; color: var(--text-dim); }
.status-bar span { background: #020617; padding: 6px 10px; border-radius: 8px; }

#status-tag {
  color: var(--neon-green); font-weight: bold;
  text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green), 0 0 15px var(--neon-green), 0 0 20px var(--neon-green);
  animation: neon-glow 1.5s ease-in-out infinite alternate;
}

@keyframes neon-glow {
  0% { text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green), 0 0 15px var(--neon-green), 0 0 20px var(--neon-green); }
  100% { text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green), 0 0 30px var(--neon-green), 0 0 40px var(--neon-green); }
}

.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.card {
  background: linear-gradient(145deg, #0f172a, #020617);
  padding: 25px; border-radius: 18px;
  box-shadow: 0 0 25px rgba(0,245,255,0.05);
}
.card h2 { margin-bottom: 15px; font-size: 1.2rem; }

.input-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

.input-grid input {
  padding: 12px 14px; border-radius: 10px; border: none;
  background: #020617; color: white; outline: none; width: 100%;
}

.input-grid input:focus {
  box-shadow: 0 0 8px rgba(0,245,255,0.3);
}

.btn-primary {
  background: linear-gradient(to right, var(--neon-cyan), var(--neon-violet));
  border: none; padding: 12px 18px; border-radius: 10px;
  font-weight: 600; cursor: pointer; transition: 0.3s;
  color: var(--text-main); width: 100%; margin-top: 10px;
}
.btn-primary:hover { transform: scale(1.03); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

#feedback {
  margin-top: 10px; padding: 10px; border-radius: 8px;
  font-size: 0.85rem; display: none;
}
#feedback.success { display: block; background: rgba(34,197,94,0.15); color: var(--neon-green); }
#feedback.error { display: block; background: rgba(239,68,68,0.15); color: var(--neon-red); }

.user-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }

.user-item {
  background: #020617; padding: 12px 15px; border-radius: 10px;
  font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center;
}
.user-item .user-info { display: flex; flex-direction: column; gap: 2px; }
.user-item .user-name { font-weight: 600; }
.user-item .user-detail { color: var(--text-dim); font-size: 0.75rem; }

.btn-delete {
  background: rgba(239,68,68,0.2); border: 1px solid var(--neon-red);
  color: var(--neon-red); padding: 6px 12px; border-radius: 8px;
  cursor: pointer; font-size: 0.75rem; transition: 0.3s;
}
.btn-delete:hover { background: rgba(239,68,68,0.4); }

.empty-msg { color: var(--text-dim); font-size: 0.9rem; }

.footer {
  margin-top: 30px; text-align: center; font-size: 0.75rem;
  color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
}

@media (max-width: 800px) {
  .dashboard-grid { grid-template-columns: 1fr; }
  .input-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="logo"></div>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/manage">Database</a></li>
    <li><a href="#">Logout</a></li>
  </ul>
</nav>

<div class="container">
  <header>
    <h1>🚀 Go System Dashboard</h1>
    <div class="status-bar">
      <span id="status-tag">● Server Online</span>
      <span id="server-time">00:00:00</span>
    </div>
  </header>

  <div class="dashboard-grid">
    <div class="card">
      <h2>Add New User</h2>
      <div class="input-grid">
        <input type="text" id="username" placeholder="Username" />
        <input type="email" id="email" placeholder="Email address" />
        <input type="tel" id="phone" placeholder="Phone number" />
        <input type="password" id="password" placeholder="Password (min 6 chars)" />
      </div>
      <button class="btn-primary" id="addBtn" onclick="addUser()">Add User</button>
      <div id="feedback"></div>
    </div>
<script>
const API = '/api/user';

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    document.getElementById('server-time').textContent = data.started_at || '00:00:00';
  } catch(e) {
    document.getElementById('status-tag').textContent = '● Offline';
    document.getElementById('status-tag').style.color = '#ef4444';
  }
}

function showFeedback(msg, type) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = type;
  setTimeout(() => { fb.className = ''; fb.style.display = 'none'; }, 4000);
}

async function addUser() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !email || !phone || !password) {
    showFeedback('❌ All fields are required!', 'error');
    return;
  }
  if (password.length < 6) {
    showFeedback('❌ Password must be at least 6 characters!', 'error');
    return;
  }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, phone, password })
    });
    const data = await res.json();

    if (res.ok) {
      showFeedback(data.message || '✅ User added!', 'success');
      document.getElementById('username').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('password').value = '';
      loadUsers();
    } else {
      showFeedback(data.message || '❌ Failed to add user', 'error');
    }
  } catch(e) {
    showFeedback('❌ Server error. Is the backend running?', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Add User';
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;

  try {
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showFeedback(`🗑️ ${name} deleted.`, 'success');
      loadUsers();
    } else {
      showFeedback('❌ Failed to delete user.', 'error');
    }
  } catch(e) {
    showFeedback('❌ Server error.', 'error');
  }
}

async function loadUsers() {
  const list = document.getElementById('user-list');
  try {
    const res = await fetch(API);
    const users = await res.json();

    if (!users || users.length === 0) {
      list.innerHTML = '<p class="empty-msg">No users added yet...</p>';
      return;
    }

    list.innerHTML = users.map(u => `
      <div class="user-item">
        <div class="user-info">
          <span class="user-name">${u.username || u.name}</span>
          <span class="user-detail">${u.email || ''} ${u.phone ? '• ' + u.phone : ''}</span>
        </div>
        <button class="btn-delete" onclick="deleteUser(${u.id}, '${(u.username || u.name).replace(/'/g, "\\'")}')">Delete</button>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<p class="empty-msg">⚠️ Cannot reach server.</p>';
  }
}

fetchStatus();
loadUsers();
</script>
</body>
</html>
