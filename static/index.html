<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Web Server | Pro Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Updated Google Fonts link -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

    <main class="container">

        <header>
            <h1>🚀 Go System Dashboard</h1>
            <div class="status-bar">
                <span id="status-tag" class="online">● Server Online</span>
                <span id="live-clock"></span>
            </div>
        </header>

        <!-- NEW: Quick Stats Row -->
        <section class="stats-grid">
            <div class="stat-card">
                <small></small>
                <div id=></div>
            </div>
            <div class="stat-card">
                <small></small>
                <div id=></div>
            </div>
        </section>

        <!-- Interactive API Card -->
        <section class="card">
            <h2>User Registration</h2>
            <p>Enter a name to register it in the Go backend memory.</p>
            
            <!-- NEW: Form Input -->
            <div class="input-group">
                <input type="text" id="userName" placeholder="Enter name">
                <button class="btn-primary" onclick="testAPI()">Add User</button>
            </div>
            
            <div id="response-box" class="hidden">
                <strong>Latest Response:</strong>
                <pre id="api-data">Waiting for input...</pre>
            </div>
        </section>

                        <!-- Data will be injected here by script.js -->
                        <tr>
                            <td colspan="3" style="text-align:center; color: #64748b;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer>
            <p>Powered by <strong>Chekus Joseph Coder</strong></p>
        </footer>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
